services:
  - type: web
    name: apphermann
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_PASSWORD_HASH
        sync: false
      - key: APP_CORS_ORIGINS
        value: http://localhost,capacitor://localhost,null
      - key: APP_CROSS_ORIGIN_AUTH
        value: true
      - key: DB_PATH
        value: /tmp/apphermann.json
